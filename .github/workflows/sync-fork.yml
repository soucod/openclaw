name: Sync fork from upstream

on:
  schedule:
    - cron: '0 1/7 * * *'   # 每天 1点后每7小时触发一次
      timezone: 'Asia/Shanghai'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync upstream main to avwq_dev
        run: |
          git config user.name ${{ secrets.GIT_NAME }}
          git config user.email ${{ secrets.GIT_EMAIL }}

          git remote add upstream https://github.com/openclaw/openclaw.git
          git fetch upstream main

          # 切到目标分支；不存在就创建
          if git show-ref --verify --quiet refs/heads/avwq_dev; then
            git checkout avwq_dev
          else
            git checkout -b avwq_dev
          fi

          # 强制让 avwq_dev 与 upstream/main 完全一致
          git reset --hard upstream/main
          git push origin avwq_dev --force
